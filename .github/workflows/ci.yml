name: ci
on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[test]
      - name: Compile
        run: python -m compileall backend shared client_android client_windows
      - name: Tests
        run: pytest -q
